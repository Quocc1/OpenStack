connector.name=iceberg
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.catalog-name=warehouse
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/postgres
iceberg.jdbc-catalog.connection-user=postgres
iceberg.jdbc-catalog.connection-password=postgres
iceberg.jdbc-catalog.default-warehouse-dir=s3://warehouse

fs.native-s3.enabled=true
s3.path-style-access=true
s3.endpoint=http://rustfs:9000
s3.aws-access-key=admin
s3.aws-secret-key=password
s3.region=us-east-1
s3.socket-connect-timeout=50000s
s3.socket-timeout=50000s
s3.max-connections=1000